name: Update Repos Data

on:
  # Run every hour
  schedule:
    - cron: '0 * * * *'

  # Allow manual trigger from Actions tab
  workflow_dispatch:

  # Run on push to main (optional, for testing)
  push:
    branches: [ main, master ]

jobs:
  update-repos:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch GitHub repos data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Fetch the repo list (quote the URL so & / ? aren't parsed by the shell)
          curl -fsS -H "Authorization: token ${GH_TOKEN}" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/users/letdown2491/repos?per_page=100&sort=updated" \
               > repos_raw.json

          # Helper: extract the first "screenshot-like" image from a README.
          # Skips badges/shields and SVG logos; resolves relative paths to raw URLs.
          cat > extract_screenshot.py <<'PY'
          import re, sys

          owner, repo, default_branch = sys.argv[1], sys.argv[2], sys.argv[3]
          text = sys.stdin.read()

          BADGE_HINTS = ('shields.io', 'badge', 'badgen', 'travis', 'circleci',
                         'codecov', 'coveralls', 'forthebadge', 'gitpod',
                         'app.netlify.com', 'vercel.app/button')
          RASTER = ('.png', '.jpg', '.jpeg', '.gif', '.webp')

          candidates = []
          for m in re.finditer(r'!\[[^\]]*\]\(\s*<?([^)\s>]+)', text):
              candidates.append((m.start(), m.group(1)))
          for m in re.finditer(r'<img[^>]+src=["\']([^"\']+)', text, re.IGNORECASE):
              candidates.append((m.start(), m.group(1)))
          candidates.sort(key=lambda c: c[0])

          def looks_like_screenshot(u):
              lu = u.lower().split('?')[0]
              if any(h in u.lower() for h in BADGE_HINTS):
                  return False
              # Accept known raster extensions; reject .svg (usually logos/badges).
              # User-content hosts often omit extensions, so allow those too.
              if lu.endswith(RASTER):
                  return True
              if 'githubusercontent.com' in lu and not lu.endswith('.svg'):
                  return True
              return False

          def to_raw(u):
              # github.com/{o}/{r}/blob/{path} points at an HTML page, not the
              # image itself; rewrite to the raw host so it loads as an <img>.
              m = re.match(r'https?://github\.com/([^/]+)/([^/]+)/blob/(.+)', u)
              if m:
                  return 'https://raw.githubusercontent.com/%s/%s/%s' % m.groups()
              return u

          for _, url in candidates:
              if not looks_like_screenshot(url):
                  continue
              if not url.startswith(('http://', 'https://')):
                  url = 'https://raw.githubusercontent.com/%s/%s/%s/%s' % (
                      owner, repo, default_branch, url.lstrip('./'))
              print(to_raw(url))
              break
          PY

          # For each repo, fetch its language breakdown and first README screenshot.
          echo '{}' > languages.json
          echo '{}' > screenshots.json
          for name in $(jq -r '.[].name' repos_raw.json); do
            langs=$(curl -fsS -H "Authorization: token ${GH_TOKEN}" \
                         -H "Accept: application/vnd.github.v3+json" \
                         "https://api.github.com/repos/letdown2491/${name}/languages" \
                    | jq '[to_entries | sort_by(-.value) | .[].key]')
            jq --arg name "$name" --argjson langs "$langs" \
               '. + {($name): $langs}' languages.json > languages.tmp.json
            mv languages.tmp.json languages.json

            branch=$(jq -r --arg name "$name" '.[] | select(.name == $name) | .default_branch' repos_raw.json)
            readme=$(curl -fsS -H "Authorization: token ${GH_TOKEN}" \
                          -H "Accept: application/vnd.github.raw" \
                          "https://api.github.com/repos/letdown2491/${name}/readme" 2>/dev/null || true)
            shot=$(printf '%s' "$readme" | python3 extract_screenshot.py "letdown2491" "$name" "${branch:-HEAD}")
            jq --arg name "$name" --arg shot "$shot" \
               '. + {($name): (if $shot == "" then null else $shot end)}' \
               screenshots.json > screenshots.tmp.json
            mv screenshots.tmp.json screenshots.json
          done

          # Merge the language arrays and screenshot URLs into the trimmed objects.
          jq --slurpfile langmap languages.json --slurpfile shotmap screenshots.json '[.[] | {
                   name: .name,
                   description: .description,
                   html_url: .html_url,
                   language: .language,
                   languages: ($langmap[0][.name] // []),
                   screenshot: ($shotmap[0][.name] // null),
                   stargazers_count: .stargazers_count,
                   forks_count: .forks_count,
                   open_issues_count: .open_issues_count,
                   topics: .topics,
                   updated_at: .updated_at,
                   pushed_at: .pushed_at,
                   created_at: .created_at,
                   homepage: .homepage,
                   license: .license.name,
                   archived: .archived,
                   watchers_count: .watchers_count,
                   fork: .fork
                 }]' repos_raw.json > repos.json

          rm -f repos_raw.json languages.json screenshots.json extract_screenshot.py

      - name: Check for changes
        id: git-check
        run: |
          # Stage first so a brand-new (untracked) repos.json is detected too;
          # plain `git diff` ignores untracked files.
          git add repos.json
          git diff --cached --quiet repos.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repos.json
          git commit -m "Update repos data"
          git push
